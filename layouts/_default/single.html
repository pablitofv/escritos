{{ define "main" }}
<article class="piece {{ .Section }}">
  <header class="piece-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="piece-subtitle">{{ . }}</p>{{ end }}
    {{ if eq .Section "escritos" }}<time class="piece-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2006" }}</time>{{ end }}
  </header>

  <div class="piece-body">
    {{ .Content }}
  </div>

  <footer class="piece-footer">
    <a href="{{ if eq .Section "escritos" }}{{ "escritos/" | relURL }}{{ else }}{{ "/" | relURL }}{{ end }}">&larr; Volver</a>
  </footer>
</article>
{{ end }}
